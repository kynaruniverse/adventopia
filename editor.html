<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Adventopia — Scene Editor</title>
  <style>
    :root {
      --navy:    #1a237e;
      --blue:    #2C5F8A;
      --gold:    #FFD700;
      --green:   #4CAF50;
      --red:     #e53935;
      --purple:  #7c3aed;
      --panel:   #0f172a;
      --surface: #1e293b;
      --surface2:#273548;
      --border:  rgba(255,255,255,0.1);
      --text:    #e2e8f0;
      --muted:   #94a3b8;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--panel);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── TOP BAR ── */
    #topbar {
      background: var(--navy);
      border-bottom: 2px solid var(--gold);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      z-index: 100;
      flex-wrap: wrap;
    }
    #topbar h1 { font-size:0.95rem; color:var(--gold); font-weight:bold; white-space:nowrap; flex-shrink:0; }
    #scene-select {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 8px; font-size: 0.85rem; cursor: pointer;
      flex: 1; min-width: 160px;
    }
    .btn {
      padding: 7px 12px; border-radius: 6px; border: none;
      font-size: 0.8rem; font-weight: bold; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
    }
    .btn-gold   { background:var(--gold);    color:var(--navy); }
    .btn-green  { background:var(--green);   color:white; }
    .btn-red    { background:var(--red);     color:white; }
    .btn-muted  { background:var(--surface); color:var(--text); border:1px solid var(--border); }
    .btn-purple { background:var(--purple);  color:white; }

    /* ── LAYOUT ── */
    #main { display:flex; flex:1; overflow:hidden; }

    /* ── CANVAS ── */
    #canvas-wrap {
      flex:1; position:relative; overflow:hidden;
      background:#06080f; touch-action:none;
    }
    #scene-canvas { position:absolute; top:0; left:0; touch-action:none; }
    #coord-badge {
      position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.75); color:var(--gold);
      font-size:0.75rem; font-family:monospace;
      padding:4px 14px; border-radius:20px;
      pointer-events:none; white-space:nowrap;
      backdrop-filter:blur(4px); z-index:10;
    }

    /* ── SIDE PANEL ── */
    #panel {
      width:240px; flex-shrink:0;
      background:var(--surface);
      border-left:1px solid var(--border);
      display:flex; flex-direction:column; overflow:hidden;
    }
    #panel-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
    .tab {
      flex:1; padding:9px 2px; text-align:center;
      font-size:0.65rem; font-weight:bold; cursor:pointer;
      color:var(--muted); border-bottom:2px solid transparent;
      text-transform:uppercase; letter-spacing:0.04em;
    }
    .tab.active { color:var(--gold); border-bottom-color:var(--gold); }
    #panel-body { flex:1; overflow-y:auto; padding:10px; }
    #panel-body::-webkit-scrollbar { width:3px; }
    #panel-body::-webkit-scrollbar-thumb { background:var(--border); }

    /* ── OBJECT LIST ── */
    .obj-row {
      background:var(--panel); border:1.5px solid var(--border);
      border-radius:8px; padding:8px 10px; margin-bottom:6px; cursor:pointer;
    }
    .obj-row.sel { border-color:var(--gold); background:rgba(255,215,0,0.05); }
    .obj-row-name { font-size:0.82rem; font-weight:bold; }
    .obj-row-vals { font-size:0.7rem; color:var(--muted); font-family:monospace; margin-top:2px; }
    .badge {
      display:inline-block; font-size:0.6rem; padding:1px 5px;
      border-radius:8px; font-weight:bold; text-transform:uppercase; margin-bottom:3px;
    }
    .badge-char { background:rgba(124,58,237,0.25); color:#c084fc; }
    .badge-obj  { background:rgba(44,95,138,0.25);  color:#7dd3fc; }

    /* ── PROPERTIES ── */
    .pg-title {
      font-size:0.65rem; text-transform:uppercase; letter-spacing:0.08em;
      color:var(--muted); margin:12px 0 6px; padding-bottom:3px;
      border-bottom:1px solid var(--border);
    }
    .pg-title:first-child { margin-top:0; }
    .pr { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
    .pl { font-size:0.72rem; color:var(--muted); width:16px; flex-shrink:0; text-align:right; }
    .pi {
      flex:1; background:var(--panel); border:1px solid var(--border);
      border-radius:4px; color:var(--text); padding:5px 7px;
      font-size:0.82rem; font-family:monospace;
    }
    .pi:focus { outline:none; border-color:var(--gold); }
    .nudge-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; margin-top:6px; }
    .nudge-grid .btn { padding:8px 4px; font-size:1rem; text-align:center; }
    .delete-btn {
      width:100%; margin-top:12px; padding:9px;
      background:rgba(229,57,53,0.15); border:1px solid rgba(229,57,53,0.35);
      border-radius:8px; color:#ff8a80; font-size:0.85rem;
      font-weight:bold; cursor:pointer; transition:background 0.15s; text-align:center;
    }
    .delete-btn:hover { background:rgba(229,57,53,0.3); }

    /* ── ASSET PANEL ── */
    .asset-section-title {
      font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em;
      color:var(--gold); margin:14px 0 8px; padding:4px 8px;
      background:rgba(255,215,0,0.08); border-radius:4px;
      border-left:3px solid var(--gold);
    }
    .asset-section-title:first-of-type { margin-top:0; }
    .asset-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:8px; }
    .asset-thumb {
      background:var(--panel); border:1.5px solid var(--border);
      border-radius:8px; padding:8px 6px; text-align:center;
      cursor:pointer; transition:border-color 0.15s, background 0.15s;
    }
    .asset-thumb:hover   { border-color:var(--blue); background:var(--surface2); }
    .asset-thumb.selected { border-color:var(--gold); background:rgba(255,215,0,0.08); }
    .asset-thumb img {
      width:100%; height:54px; object-fit:contain;
      display:block; margin-bottom:4px; image-rendering:auto;
    }
    .asset-thumb .asset-name {
      font-size:0.62rem; color:var(--muted); word-break:break-all; line-height:1.3;
    }
    .asset-actions { display:flex; gap:6px; margin-bottom:10px; }
    .asset-actions .btn { flex:1; font-size:0.75rem; padding:7px 6px; }
    #selected-asset-info {
      font-size:0.72rem; color:var(--gold); margin-bottom:10px;
      padding:5px 8px; background:rgba(255,215,0,0.07);
      border-radius:6px; border:1px solid rgba(255,215,0,0.2);
    }

    /* ── JSON PANE ── */
    #json-out {
      background:var(--panel); border:1px solid var(--border);
      border-radius:6px; padding:8px; font-size:0.67rem;
      font-family:monospace; color:#86efac; white-space:pre; overflow:auto; line-height:1.5;
    }

    /* ── STATUS / TOAST ── */
    #statusbar {
      background:var(--navy); border-top:1px solid var(--border);
      padding:5px 12px; font-size:0.72rem; color:var(--muted);
      flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    #toast {
      position:fixed; bottom:32px; left:50%;
      transform:translateX(-50%) translateY(60px);
      background:var(--green); color:white;
      padding:8px 18px; border-radius:20px;
      font-size:0.85rem; font-weight:bold;
      transition:transform 0.25s ease; z-index:9999; pointer-events:none;
    }
    #toast.up { transform:translateX(-50%) translateY(0); }

    /* ── LOADER ── */
    #loader {
      position:absolute; inset:0; background:rgba(6,8,15,0.85);
      display:flex; align-items:center; justify-content:center;
      z-index:50; color:var(--muted); font-size:0.9rem;
      flex-direction:column; gap:10px;
    }
    #loader.gone { display:none; }
    .spinner {
      width:32px; height:32px; border:3px solid var(--border);
      border-top-color:var(--gold); border-radius:50%;
      animation:spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── MOBILE ── */
    @media (max-width:600px) {
      #main { flex-direction:column-reverse; }
      #panel { width:100%; height:220px; border-left:none; border-top:1px solid var(--border); }
    }
  </style>
</head>
<body>

<div id="topbar">
  <h1>🗺️ Scene Editor</h1>
  <select id="scene-select" onchange="loadScene(this.value)">
    <option value="">— choose scene —</option>
    <option value="scene1_village_square">Village Square</option>
    <option value="scene2_library">Library</option>
    <option value="scene3_town_gate">Town Gate</option>
  </select>
  <button class="btn btn-gold"  onclick="copyJSON()">📋 Copy</button>
  <button class="btn btn-green" onclick="downloadJSON()">⬇️ Save</button>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="scene-canvas"></canvas>
    <div id="loader">
      <div class="spinner"></div>
      <span id="loader-msg">Choose a scene above</span>
    </div>
    <div id="coord-badge"></div>
  </div>

  <div id="panel">
    <div id="panel-tabs">
      <div class="tab active" id="tab-obj"    onclick="switchTab('obj')">Objects</div>
      <div class="tab"        id="tab-prop"   onclick="switchTab('prop')">Props</div>
      <div class="tab"        id="tab-assets" onclick="switchTab('assets')">Assets</div>
      <div class="tab"        id="tab-json"   onclick="switchTab('json')">JSON</div>
    </div>
    <div id="panel-body">
      <div id="pane-obj"></div>
      <div id="pane-prop"   style="display:none"><p style="color:var(--muted);font-size:0.8rem;margin-top:8px">Select an object.</p></div>
      <div id="pane-assets" style="display:none"></div>
      <div id="pane-json"   style="display:none"><pre id="json-out">Load a scene first.</pre></div>
    </div>
  </div>
</div>

<div id="statusbar">Ready — choose a scene to begin</div>
<div id="toast">Done!</div>

<script>
/* ─── ASSET REGISTRY ─── */
const ASSETS = {
  characters: [
    'benny_baker.png','gus_gatekeeper.png','mara_librarian.png','pip.png','shell.png'
  ],
  objects: [
    'bench.png','bookshelves-1.png','bookshelves.png','fountain.png',
    'gate_panel.png','ivy_walls.png','notice_board.png',
    'signpost.png','spiral_staircase.png','wall_map.png'
  ]
};

const BASE = './game/';

/* ─── STATE ─── */
let sceneData    = null;
let bgImg        = null;
let assetImgs    = {};
let selectedIdx  = -1;
let dragging     = false;
let resizing     = false;
let resizeCorner = null;
let dragOff      = { x:0, y:0 };
let resizeOrigin = null;
let activeTab    = 'obj';
let selectedAsset = null;  // { filename, folder }

const canvas = document.getElementById('scene-canvas');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');

/* ─── CANVAS SIZE ─── */
function fitCanvas() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';
  redraw();
}
new ResizeObserver(fitCanvas).observe(wrap);

/* ─── SCENE LOADER ─── */
async function loadScene(id) {
  if (!id) return;
  selectedIdx = -1; selectedAsset = null; bgImg = null; assetImgs = {};
  showLoader('Loading scene…');
  try {
    const res = await fetch(`${BASE}data/${id}.json`);
    if (!res.ok) throw new Error('Scene JSON not found');
    sceneData = await res.json();

    if (sceneData.backgroundImage) {
      bgImg = await loadImg(`${BASE}assets/backgrounds/${sceneData.backgroundImage}`).catch(()=>null);
    }
    await Promise.all((sceneData.objects||[]).map(obj => {
      if (!obj.image) return;
      const f = obj.imageType||'objects';
      return loadImg(`${BASE}assets/${f}/${obj.image}`).then(i=>{ assetImgs[obj.image]=i; }).catch(()=>{});
    }));
    preloadAll();
    hideLoader(); buildObjectList(); buildAssetPanel(); updateJSON(); redraw();
    setStatus(`Loaded: ${sceneData.name}  —  ${(sceneData.objects||[]).length} objects`);
  } catch(e) { hideLoader('⚠️ '+e.message); setStatus('Error: '+e.message); }
}

function loadImg(src) {
  return new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=src; });
}

function preloadAll() {
  [...ASSETS.characters,...ASSETS.objects].forEach(f => {
    if (assetImgs[f]) return;
    const folder = ASSETS.characters.includes(f) ? 'characters' : 'objects';
    loadImg(`${BASE}assets/${folder}/${f}`).then(i=>{ assetImgs[f]=i; }).catch(()=>{});
  });
}

/* ─── DRAW ─── */
function redraw() {
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if (!sceneData) return;

  if (bgImg) { drawCover(ctx,bgImg,0,0,W,H); }
  else {
    ctx.fillStyle = sceneData.backgroundColor||'#87CEEB';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.font='13px sans-serif'; ctx.textAlign='center';
    ctx.fillText('Background not loaded',W/2,H/2);
  }

  (sceneData.objects||[]).forEach((obj,i) => {
    const {px,py,pw,ph} = toPixels(obj);
    const isSel = i===selectedIdx;
    const img   = assetImgs[obj.image]||null;
    ctx.save();
    if (isSel) { ctx.shadowColor='rgba(255,215,0,0.9)'; ctx.shadowBlur=20; }
    if (img) {
      drawContain(ctx,img,px,py,pw,ph);
    } else {
      ctx.fillStyle=(obj.color||'#FFD700')+(isSel?'dd':'aa');
      ctx.fillRect(px,py,pw,ph);
      ctx.strokeStyle=isSel?'#FFD700':'rgba(255,255,255,0.3)';
      ctx.lineWidth=isSel?2.5:1; ctx.strokeRect(px,py,pw,ph);
      ctx.fillStyle='rgba(0,0,0,0.65)';
      ctx.font=`bold ${Math.max(10,pw/7)}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(obj.label||obj.id,px+pw/2,py+ph/2);
    }
    if (isSel) {
      ctx.shadowBlur=0;
      ctx.strokeStyle='#FFD700'; ctx.lineWidth=2;
      ctx.setLineDash([5,3]); ctx.strokeRect(px-2,py-2,pw+4,ph+4); ctx.setLineDash([]);
      [[px,py],[px+pw,py],[px,py+ph],[px+pw,py+ph]].forEach(([hx,hy])=>{
        ctx.fillStyle='#FFD700'; ctx.strokeStyle='#1a237e'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.arc(hx,hy,7,0,Math.PI*2); ctx.fill(); ctx.stroke();
      });
      const lbl=obj.label||obj.id;
      ctx.font='bold 10px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
      const tw=ctx.measureText(lbl).width+12, ty=Math.max(16,py-2);
      ctx.fillStyle='rgba(255,215,0,0.92)';
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(px+pw/2-tw/2,ty-16,tw,16,4) : ctx.rect(px+pw/2-tw/2,ty-16,tw,16);
      ctx.fill(); ctx.fillStyle='#1a237e'; ctx.fillText(lbl,px+pw/2,ty);
    }
    ctx.restore();
  });
}

/* ─── IMAGE HELPERS ─── */
function drawCover(ctx,img,x,y,w,h){
  const ir=img.naturalWidth/img.naturalHeight,tr=w/h;
  let sx,sy,sw,sh;
  if(ir>tr){sh=img.naturalHeight;sw=sh*tr;sx=(img.naturalWidth-sw)/2;sy=0;}
  else{sw=img.naturalWidth;sh=sw/tr;sx=0;sy=(img.naturalHeight-sh)/2;}
  ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);
}
function drawContain(ctx,img,x,y,w,h){
  const ir=img.naturalWidth/img.naturalHeight,tr=w/h;
  let dw,dh,dx,dy;
  if(ir>tr){dw=w;dh=w/ir;dx=x;dy=y+(h-dh)/2;}
  else{dh=h;dw=h*ir;dx=x+(w-dw)/2;dy=y;}
  ctx.drawImage(img,dx,dy,dw,dh);
}

/* ─── COORD HELPERS ─── */
function toPixels(obj){
  return{px:(obj.x/100)*canvas.width,py:(obj.y/100)*canvas.height,
         pw:(obj.w/100)*canvas.width,ph:(obj.h/100)*canvas.height};
}
function toPercent(px,py,pw,ph){
  return{x:r1((px/canvas.width)*100),y:r1((py/canvas.height)*100),
         w:r1((pw/canvas.width)*100),h:r1((ph/canvas.height)*100)};
}
function r1(v){return Math.round(v*10)/10;}
function ptr(e){const r=canvas.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
function hitObj(x,y){
  if(!sceneData?.objects)return -1;
  for(let i=sceneData.objects.length-1;i>=0;i--){
    const{px,py,pw,ph}=toPixels(sceneData.objects[i]);
    if(x>=px&&x<=px+pw&&y>=py&&y<=py+ph)return i;
  }return -1;
}
function hitCorner(x,y,obj){
  const{px,py,pw,ph}=toPixels(obj);
  const c={tl:[px,py],tr:[px+pw,py],bl:[px,py+ph],br:[px+pw,py+ph]};
  for(const[n,[cx,cy]]of Object.entries(c)){if(Math.hypot(x-cx,y-cy)<14)return n;}
  return null;
}

/* ─── POINTER EVENTS ─── */
canvas.addEventListener('mousedown', down);
canvas.addEventListener('mousemove', move);
canvas.addEventListener('mouseup',   up);
canvas.addEventListener('mouseleave',up);
canvas.addEventListener('touchstart',down,{passive:false});
canvas.addEventListener('touchmove', move,{passive:false});
canvas.addEventListener('touchend',  up);

function down(e){
  if(!sceneData)return; e.preventDefault();
  const{x,y}=ptr(e);
  if(selectedIdx>=0){
    const c=hitCorner(x,y,sceneData.objects[selectedIdx]);
    if(c){resizing=true;resizeCorner=c;resizeOrigin={x,y,obj:{...sceneData.objects[selectedIdx]}};return;}
  }
  const hit=hitObj(x,y);
  if(hit>=0){selectedIdx=hit;dragging=true;const{px,py}=toPixels(sceneData.objects[hit]);dragOff={x:x-px,y:y-py};}
  else selectedIdx=-1;
  buildObjectList();showProps();redraw();
}
function move(e){
  if(!sceneData)return; e.preventDefault();
  const{x,y}=ptr(e);
  if(resizing&&resizeOrigin){
    const orig=resizeOrigin.obj,dx=x-resizeOrigin.x,dy=y-resizeOrigin.y;
    const ox=(orig.x/100)*canvas.width,oy=(orig.y/100)*canvas.height;
    const ow=(orig.w/100)*canvas.width,oh=(orig.h/100)*canvas.height;
    let nx=ox,ny=oy,nw=ow,nh=oh;
    if(resizeCorner==='br'){nw=Math.max(20,ow+dx);nh=Math.max(20,oh+dy);}
    if(resizeCorner==='bl'){nx=ox+dx;nw=Math.max(20,ow-dx);nh=Math.max(20,oh+dy);}
    if(resizeCorner==='tr'){ny=oy+dy;nw=Math.max(20,ow+dx);nh=Math.max(20,oh-dy);}
    if(resizeCorner==='tl'){nx=ox+dx;ny=oy+dy;nw=Math.max(20,ow-dx);nh=Math.max(20,oh-dy);}
    Object.assign(sceneData.objects[selectedIdx],toPercent(nx,ny,nw,nh));
    coordBadge();showProps();buildObjectList();updateJSON();redraw();return;
  }
  if(dragging&&selectedIdx>=0){
    const obj=sceneData.objects[selectedIdx],{pw,ph}=toPixels(obj);
    const nx=Math.max(0,Math.min(canvas.width-pw,x-dragOff.x));
    const ny=Math.max(0,Math.min(canvas.height-ph,y-dragOff.y));
    const u=toPercent(nx,ny,pw,ph); obj.x=u.x; obj.y=u.y;
    coordBadge();showProps();buildObjectList();updateJSON();redraw();
  }
}
function up(){dragging=false;resizing=false;resizeCorner=null;resizeOrigin=null;}
function coordBadge(){
  const el=document.getElementById('coord-badge');
  if(selectedIdx<0||!sceneData){el.textContent='';return;}
  const o=sceneData.objects[selectedIdx];
  el.textContent=`${o.label||o.id}  x:${o.x} y:${o.y} w:${o.w} h:${o.h}`;
}

/* ─── TABS ─── */
function switchTab(name){
  activeTab=name;
  ['obj','prop','assets','json'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===name);
    document.getElementById('pane-'+t).style.display=t===name?'':'none';
  });
}

/* ─── OBJECT LIST ─── */
function buildObjectList(){
  const pane=document.getElementById('pane-obj');
  if(!sceneData?.objects){pane.innerHTML='<p style="color:var(--muted);font-size:0.8rem;margin-top:8px">Load a scene.</p>';return;}
  pane.innerHTML='<p style="font-size:0.72rem;color:var(--muted);margin-bottom:8px;line-height:1.5"><strong style="color:var(--text)">Drag</strong> to move · <strong style="color:var(--text)">Corners</strong> to resize</p>';
  sceneData.objects.forEach((obj,i)=>{
    const isChar=obj.imageType==='characters';
    const d=document.createElement('div');
    d.className=`obj-row${i===selectedIdx?' sel':''}`;
    d.innerHTML=`<span class="badge ${isChar?'badge-char':'badge-obj'}">${isChar?'char':'obj'}</span>
      <div class="obj-row-name">${obj.label||obj.id}</div>
      <div class="obj-row-vals">x:${obj.x} y:${obj.y} w:${obj.w} h:${obj.h}</div>`;
    d.onclick=()=>{selectedIdx=i;buildObjectList();showProps();switchTab('prop');redraw();coordBadge();};
    pane.appendChild(d);
  });
}

/* ─── PROPERTIES ─── */
function showProps(){
  const pane=document.getElementById('pane-prop');
  if(selectedIdx<0||!sceneData){pane.innerHTML='<p style="color:var(--muted);font-size:0.8rem;margin-top:8px">Select an object.</p>';return;}
  const obj=sceneData.objects[selectedIdx];
  pane.innerHTML=`
    <div class="pg-title">Identity</div>
    <div style="font-size:0.72rem;color:var(--muted);margin-bottom:2px;font-family:monospace">${obj.id}</div>
    <div style="font-size:0.8rem;margin-bottom:6px">${obj.label||'—'}</div>
    <div style="font-size:0.72rem;color:var(--muted);margin-bottom:10px">Image: <span style="color:#86efac;font-family:monospace">${obj.image||'none'}</span></div>
    <div class="pg-title">Position %</div>
    <div class="pr"><span class="pl">X</span><input class="pi" type="number" step="0.5" value="${obj.x}" oninput="setProp('x',this.value)"/></div>
    <div class="pr"><span class="pl">Y</span><input class="pi" type="number" step="0.5" value="${obj.y}" oninput="setProp('y',this.value)"/></div>
    <div class="pg-title">Size %</div>
    <div class="pr"><span class="pl">W</span><input class="pi" type="number" step="0.5" value="${obj.w}" oninput="setProp('w',this.value)"/></div>
    <div class="pr"><span class="pl">H</span><input class="pi" type="number" step="0.5" value="${obj.h}" oninput="setProp('h',this.value)"/></div>
    <div class="pg-title">Nudge (1% steps)</div>
    <div class="nudge-grid">
      <div></div><button class="btn btn-muted" onclick="nudge(0,-1)">▲</button><div></div>
      <button class="btn btn-muted" onclick="nudge(-1,0)">◀</button>
      <button class="btn btn-muted" style="opacity:0.3" disabled>·</button>
      <button class="btn btn-muted" onclick="nudge(1,0)">▶</button>
      <div></div><button class="btn btn-muted" onclick="nudge(0,1)">▼</button><div></div>
    </div>
    <div class="pg-title" style="margin-top:14px">Swap image</div>
    <p style="font-size:0.72rem;color:var(--muted);margin-bottom:6px">Go to Assets tab → select image → tap Swap.</p>
    <button class="delete-btn" onclick="deleteSelected()">🗑 Remove from scene</button>
  `;
}

function setProp(key,val){
  if(selectedIdx<0||!sceneData)return;
  const v=parseFloat(val); if(isNaN(v))return;
  sceneData.objects[selectedIdx][key]=r1(v);
  buildObjectList();updateJSON();redraw();coordBadge();
}
function nudge(dx,dy){
  if(selectedIdx<0||!sceneData)return;
  const obj=sceneData.objects[selectedIdx];
  obj.x=r1(obj.x+dx);obj.y=r1(obj.y+dy);
  showProps();buildObjectList();updateJSON();redraw();coordBadge();
}
function deleteSelected(){
  if(selectedIdx<0||!sceneData?.objects)return;
  const name=sceneData.objects[selectedIdx].label||sceneData.objects[selectedIdx].id;
  if(!confirm(`Remove "${name}" from this scene?`))return;
  sceneData.objects.splice(selectedIdx,1);
  selectedIdx=-1;
  buildObjectList();showProps();updateJSON();redraw();coordBadge();
  toast(`Removed ${name}`);
}

/* ─── ASSET PANEL ─── */
function buildAssetPanel(){
  const pane=document.getElementById('pane-assets');
  pane.innerHTML=`
    <p style="font-size:0.72rem;color:var(--muted);margin-bottom:10px;line-height:1.6">
      Tap asset to select · <strong style="color:var(--text)">Add</strong> places it in scene ·
      <strong style="color:var(--text)">Swap</strong> replaces selected object's image
    </p>
    <div class="asset-actions">
      <button class="btn btn-green"  onclick="addAsset()">＋ Add</button>
      <button class="btn btn-purple" onclick="swapAsset()">⇄ Swap</button>
    </div>
    <div id="selected-asset-info" style="display:none" class="">
      Selected: <span id="sel-asset-name">—</span>
    </div>
  `;
  appendAssets(pane,'Characters',ASSETS.characters,'characters');
  appendAssets(pane,'Objects',   ASSETS.objects,   'objects');
}

function appendAssets(parent,title,files,folder){
  const t=document.createElement('div');
  t.className='asset-section-title'; t.textContent=title; parent.appendChild(t);
  const grid=document.createElement('div'); grid.className='asset-grid'; parent.appendChild(grid);
  files.forEach(f=>{
    const thumb=document.createElement('div');
    thumb.className='asset-thumb'; thumb.dataset.f=f; thumb.dataset.folder=folder;
    const img=document.createElement('img');
    img.src=`${BASE}assets/${folder}/${f}`; img.alt=f;
    img.onerror=()=>{img.style.opacity='0.25';};
    const lbl=document.createElement('div');
    lbl.className='asset-name'; lbl.textContent=f.replace('.png','');
    thumb.appendChild(img); thumb.appendChild(lbl);
    thumb.onclick=()=>pickAsset(f,folder,thumb);
    grid.appendChild(thumb);
  });
}

function pickAsset(f,folder,el){
  document.querySelectorAll('.asset-thumb').forEach(t=>t.classList.remove('selected'));
  el.classList.add('selected');
  selectedAsset={filename:f,folder};
  const info=document.getElementById('selected-asset-info');
  info.style.display='block';
  document.getElementById('sel-asset-name').textContent=f;
}

function addAsset(){
  if(!sceneData){toast('Load a scene first');return;}
  if(!selectedAsset){toast('Select an asset first');return;}
  const isChar=selectedAsset.folder==='characters';
  const id=selectedAsset.filename.replace('.png','').replace(/[^a-z0-9]/gi,'_').toLowerCase()+'_'+Date.now().toString(36);
  const obj={
    id, image:selectedAsset.filename,
    label:selectedAsset.filename.replace('.png','').replace(/[-_]/g,' '),
    x:40, y:30,
    w:isChar?16:14, h:isChar?28:20,
    color:isChar?'#FF9800':'#64B5F6',
    dialogue:'...'
  };
  if(isChar) obj.imageType='characters';
  if(!sceneData.objects) sceneData.objects=[];
  sceneData.objects.push(obj);
  if(!assetImgs[selectedAsset.filename]){
    loadImg(`${BASE}assets/${selectedAsset.folder}/${selectedAsset.filename}`)
      .then(i=>{assetImgs[selectedAsset.filename]=i;redraw();}).catch(()=>{});
  }
  selectedIdx=sceneData.objects.length-1;
  buildObjectList();showProps();updateJSON();redraw();switchTab('prop');
  toast(`Added — drag it into position`);
}

function swapAsset(){
  if(!sceneData){toast('Load a scene first');return;}
  if(selectedIdx<0){toast('Select an object on canvas first');return;}
  if(!selectedAsset){toast('Select an asset from the list');return;}
  const obj=sceneData.objects[selectedIdx];
  obj.image=selectedAsset.filename;
  if(selectedAsset.folder==='characters') obj.imageType='characters';
  else delete obj.imageType;
  if(!assetImgs[selectedAsset.filename]){
    loadImg(`${BASE}assets/${selectedAsset.folder}/${selectedAsset.filename}`)
      .then(i=>{assetImgs[selectedAsset.filename]=i;redraw();}).catch(()=>{});
  }
  buildObjectList();showProps();updateJSON();redraw();
  toast(`Swapped to ${selectedAsset.filename}`);
}

/* ─── JSON ─── */
function updateJSON(){
  if(!sceneData)return;
  document.getElementById('json-out').textContent=JSON.stringify(sceneData,null,2);
}
function copyJSON(){
  if(!sceneData){toast('Load a scene first');return;}
  const txt=JSON.stringify(sceneData,null,2);
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>toast('Copied — paste into SPCK'));}
  else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copied!');}
}
function downloadJSON(){
  if(!sceneData){toast('Load a scene first');return;}
  const b=new Blob([JSON.stringify(sceneData,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download=(sceneData.id||'scene')+'.json';a.click();URL.revokeObjectURL(u);
  toast('Downloaded '+a.download);
}

/* ─── LOADER / STATUS / TOAST ─── */
function showLoader(m){document.getElementById('loader-msg').textContent=m||'Loading…';document.getElementById('loader').classList.remove('gone');}
function hideLoader(e){const el=document.getElementById('loader');if(e){document.getElementById('loader-msg').textContent=e;return;}el.classList.add('gone');}
function setStatus(m){document.getElementById('statusbar').textContent=m;}
let tt;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('up');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('up'),2500);}
</script>
</body>
</html>
