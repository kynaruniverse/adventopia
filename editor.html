<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Adventopia — Scene Editor</title>
  <style>
    :root {
      --navy:    #1a237e;
      --blue:    #2C5F8A;
      --gold:    #FFD700;
      --green:   #4CAF50;
      --red:     #e53935;
      --panel:   #0f172a;
      --surface: #1e293b;
      --border:  rgba(255,255,255,0.1);
      --text:    #e2e8f0;
      --muted:   #94a3b8;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--panel);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── TOP BAR ── */
    #topbar {
      background: var(--navy);
      border-bottom: 2px solid var(--gold);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      z-index: 100;
    }

    #topbar h1 {
      font-size: 0.95rem;
      color: var(--gold);
      font-weight: bold;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #scene-select {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 0.85rem;
      cursor: pointer;
      flex: 1;
      min-width: 0;
    }

    .btn {
      padding: 7px 12px;
      border-radius: 6px;
      border: none;
      font-size: 0.8rem;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-gold  { background: var(--gold);  color: var(--navy); }
    .btn-green { background: var(--green); color: white; }
    .btn-muted { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    /* ── MAIN LAYOUT ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── CANVAS AREA ── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #06080f;
      touch-action: none;
    }

    #scene-canvas {
      position: absolute;
      top: 0; left: 0;
      touch-action: none;
    }

    /* Coords badge floating over canvas */
    #coord-badge {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: var(--gold);
      font-size: 0.75rem;
      font-family: monospace;
      padding: 4px 14px;
      border-radius: 20px;
      pointer-events: none;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    /* ── SIDE PANEL ── */
    #panel {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 9px 4px;
      text-align: center;
      font-size: 0.72rem;
      font-weight: bold;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    #panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    #panel-body::-webkit-scrollbar { width: 3px; }
    #panel-body::-webkit-scrollbar-thumb { background: var(--border); }

    /* Object list */
    .obj-row {
      background: var(--panel);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .obj-row.sel { border-color: var(--gold); background: rgba(255,215,0,0.05); }
    .obj-row-name { font-size: 0.82rem; font-weight: bold; }
    .obj-row-vals { font-size: 0.7rem; color: var(--muted); font-family: monospace; margin-top: 2px; }
    .badge {
      display: inline-block;
      font-size: 0.6rem;
      padding: 1px 5px;
      border-radius: 8px;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .badge-char { background: rgba(124,58,237,0.25); color:#c084fc; }
    .badge-obj  { background: rgba(44,95,138,0.25);  color:#7dd3fc; }

    /* Properties */
    .pg-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 12px 0 6px;
      padding-bottom: 3px;
      border-bottom: 1px solid var(--border);
    }
    .pg-title:first-child { margin-top: 0; }

    .pr {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .pl {
      font-size: 0.72rem;
      color: var(--muted);
      width: 16px;
      flex-shrink: 0;
      text-align: right;
    }
    .pi {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 5px 7px;
      font-size: 0.82rem;
      font-family: monospace;
      width: 100%;
    }
    .pi:focus { outline: none; border-color: var(--gold); }

    /* Nudge grid */
    .nudge-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      margin-top: 6px;
    }
    .nudge-grid .btn { padding: 8px 4px; font-size: 1rem; text-align: center; }

    /* JSON pane */
    #json-out {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      font-size: 0.67rem;
      font-family: monospace;
      color: #86efac;
      white-space: pre;
      overflow: auto;
      max-height: 100%;
      line-height: 1.5;
    }

    /* Status bar */
    #statusbar {
      background: var(--navy);
      border-top: 1px solid var(--border);
      padding: 5px 12px;
      font-size: 0.72rem;
      color: var(--muted);
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--green);
      color: white;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
      transition: transform 0.25s ease;
      z-index: 9999;
      pointer-events: none;
    }
    #toast.up { transform: translateX(-50%) translateY(0); }

    /* Loading overlay */
    #loader {
      position: absolute;
      inset: 0;
      background: rgba(6,8,15,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      color: var(--muted);
      font-size: 0.9rem;
      flex-direction: column;
      gap: 10px;
    }
    #loader.gone { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Mobile stacked layout */
    @media (max-width: 600px) {
      #main { flex-direction: column-reverse; }
      #panel {
        width: 100%;
        height: 200px;
        border-left: none;
        border-top: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>🗺️ Editor</h1>
  <select id="scene-select" onchange="loadScene(this.value)">
    <option value="">— choose scene —</option>
    <option value="scene1_village_square">Village Square</option>
    <option value="scene2_library">Library</option>
    <option value="scene3_town_gate">Town Gate</option>
  </select>
  <button class="btn btn-gold"  onclick="copyJSON()">📋 Copy</button>
  <button class="btn btn-green" onclick="downloadJSON()">⬇️ Save</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- CANVAS -->
  <div id="canvas-wrap">
    <canvas id="scene-canvas"></canvas>

    <div id="loader">
      <div class="spinner"></div>
      <span id="loader-msg">Choose a scene above</span>
    </div>

    <div id="coord-badge">x:— y:— w:— h:—</div>
  </div>

  <!-- PANEL -->
  <div id="panel">
    <div id="panel-tabs">
      <div class="tab active" id="tab-obj"  onclick="switchTab('obj')">Objects</div>
      <div class="tab"        id="tab-prop" onclick="switchTab('prop')">Props</div>
      <div class="tab"        id="tab-json" onclick="switchTab('json')">JSON</div>
    </div>
    <div id="panel-body">
      <div id="pane-obj"></div>
      <div id="pane-prop" style="display:none">
        <p style="color:var(--muted);font-size:0.8rem;margin-top:8px">Select an object.</p>
      </div>
      <div id="pane-json" style="display:none">
        <pre id="json-out">Load a scene first.</pre>
      </div>
    </div>
  </div>

</div>

<!-- STATUS BAR -->
<div id="statusbar">Ready — choose a scene to begin</div>

<!-- TOAST -->
<div id="toast">Done!</div>

<script>
/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
let sceneData   = null;
let bgImg       = null;
let assetImgs   = {};      // filename -> Image
let selectedIdx = -1;
let dragging    = false;
let resizing    = false;
let resizeCorner = null;
let dragOff     = { x: 0, y: 0 };
let resizeOrigin = null;
let activeTab   = 'obj';

const BASE = './game/';   // path relative to repo root where editor.html lives

const canvas = document.getElementById('scene-canvas');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');


/* ─────────────────────────────────────────
   CANVAS SIZING
───────────────────────────────────────── */
function fitCanvas() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';
  redraw();
}

const ro = new ResizeObserver(fitCanvas);
ro.observe(wrap);


/* ─────────────────────────────────────────
   SCENE LOADER
───────────────────────────────────────── */
async function loadScene(sceneId) {
  if (!sceneId) return;
  selectedIdx = -1;
  bgImg       = null;
  assetImgs   = {};

  showLoader('Loading scene…');

  try {
    // 1. Fetch JSON
    const res = await fetch(`${BASE}data/${sceneId}.json`);
    if (!res.ok) throw new Error('Scene JSON not found');
    sceneData = await res.json();

    // 2. Load background
    if (sceneData.backgroundImage) {
      bgImg = await loadImage(`${BASE}assets/backgrounds/${sceneData.backgroundImage}`);
    }

    // 3. Load all object images in parallel
    const jobs = (sceneData.objects || []).map(obj => {
      if (!obj.image) return Promise.resolve();
      const folder = obj.imageType || 'objects';
      return loadImage(`${BASE}assets/${folder}/${obj.image}`)
        .then(img => { assetImgs[obj.image] = img; })
        .catch(() => {});   // missing asset — skip silently
    });
    await Promise.all(jobs);

    hideLoader();
    buildObjectList();
    updateJSON();
    redraw();
    setStatus(`Loaded: ${sceneData.name}  —  ${(sceneData.objects||[]).length} objects`);

  } catch (err) {
    hideLoader('⚠️ ' + err.message);
    setStatus('Error: ' + err.message);
  }
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload  = () => resolve(img);
    img.onerror = () => reject(new Error('Failed: ' + src));
    img.src = src;
  });
}


/* ─────────────────────────────────────────
   DRAW
───────────────────────────────────────── */
function redraw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  if (!sceneData) return;

  // Background
  if (bgImg) {
    drawCover(ctx, bgImg, 0, 0, W, H);
  } else {
    ctx.fillStyle = sceneData.backgroundColor || '#87CEEB';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Background not found — check path', W/2, H/2);
  }

  // Objects
  (sceneData.objects || []).forEach((obj, i) => {
    const { px, py, pw, ph } = toPixels(obj);
    const isSel = i === selectedIdx;
    const img   = assetImgs[obj.image] || null;

    ctx.save();

    if (isSel) {
      ctx.shadowColor = 'rgba(255,215,0,0.8)';
      ctx.shadowBlur  = 18;
    }

    if (img) {
      drawContain(ctx, img, px, py, pw, ph);
    } else {
      ctx.fillStyle   = (obj.color || '#FFD700') + (isSel ? 'dd' : 'aa');
      ctx.fillRect(px, py, pw, ph);
      ctx.strokeStyle = isSel ? '#FFD700' : 'rgba(255,255,255,0.3)';
      ctx.lineWidth   = isSel ? 2.5 : 1;
      ctx.strokeRect(px, py, pw, ph);
      ctx.fillStyle    = 'rgba(0,0,0,0.65)';
      ctx.font         = `bold ${Math.max(10, pw/7)}px sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(obj.label || obj.id, px + pw/2, py + ph/2);
    }

    if (isSel) {
      // Dashed outline
      ctx.shadowBlur  = 0;
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth   = 2;
      ctx.setLineDash([5,3]);
      ctx.strokeRect(px - 2, py - 2, pw + 4, ph + 4);
      ctx.setLineDash([]);

      // Corner handles
      [[px, py],[px+pw, py],[px, py+ph],[px+pw, py+ph]].forEach(([hx,hy]) => {
        ctx.fillStyle   = '#FFD700';
        ctx.strokeStyle = '#1a237e';
        ctx.lineWidth   = 1.5;
        ctx.beginPath();
        ctx.arc(hx, hy, 7, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
      });

      // Label chip above object
      const lbl  = obj.label || obj.id;
      ctx.font   = 'bold 10px sans-serif';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'bottom';
      const tw   = ctx.measureText(lbl).width + 12;
      const ty   = Math.max(16, py - 2);
      ctx.fillStyle = 'rgba(255,215,0,0.92)';
      roundRect(ctx, px + pw/2 - tw/2, ty - 16, tw, 16, 4);
      ctx.fill();
      ctx.fillStyle = '#1a237e';
      ctx.fillText(lbl, px + pw/2, ty);
    }

    ctx.restore();
  });
}

function roundRect(ctx, x, y, w, h, r) {
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x,y,w,h,r); }
  else { ctx.beginPath(); ctx.rect(x,y,w,h); }
}


/* ─────────────────────────────────────────
   IMAGE SCALING HELPERS
───────────────────────────────────────── */
function drawCover(ctx, img, x, y, w, h) {
  const ir = img.naturalWidth / img.naturalHeight, tr = w / h;
  let sx, sy, sw, sh;
  if (ir > tr) { sh = img.naturalHeight; sw = sh*tr; sx = (img.naturalWidth-sw)/2; sy = 0; }
  else         { sw = img.naturalWidth;  sh = sw/tr; sx = 0; sy = (img.naturalHeight-sh)/2; }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function drawContain(ctx, img, x, y, w, h) {
  const ir = img.naturalWidth / img.naturalHeight, tr = w / h;
  let dw, dh, dx, dy;
  if (ir > tr) { dw=w; dh=w/ir; dx=x; dy=y+(h-dh)/2; }
  else         { dh=h; dw=h*ir; dx=x+(w-dw)/2; dy=y; }
  ctx.drawImage(img, dx, dy, dw, dh);
}


/* ─────────────────────────────────────────
   COORD HELPERS
───────────────────────────────────────── */
function toPixels(obj) {
  return {
    px: (obj.x/100)*canvas.width,
    py: (obj.y/100)*canvas.height,
    pw: (obj.w/100)*canvas.width,
    ph: (obj.h/100)*canvas.height
  };
}

function toPercent(px, py, pw, ph) {
  return {
    x: round1((px/canvas.width)*100),
    y: round1((py/canvas.height)*100),
    w: round1((pw/canvas.width)*100),
    h: round1((ph/canvas.height)*100)
  };
}

function round1(v) { return Math.round(v*10)/10; }

function getPointer(e) {
  const r   = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

function hitObject(x, y) {
  if (!sceneData?.objects) return -1;
  for (let i = sceneData.objects.length-1; i >= 0; i--) {
    const { px, py, pw, ph } = toPixels(sceneData.objects[i]);
    if (x>=px && x<=px+pw && y>=py && y<=py+ph) return i;
  }
  return -1;
}

function hitCorner(x, y, obj) {
  const { px, py, pw, ph } = toPixels(obj);
  const corners = { tl:[px,py], tr:[px+pw,py], bl:[px,py+ph], br:[px+pw,py+ph] };
  for (const [name,[cx,cy]] of Object.entries(corners)) {
    if (Math.hypot(x-cx, y-cy) < 14) return name;
  }
  return null;
}


/* ─────────────────────────────────────────
   POINTER EVENTS
───────────────────────────────────────── */
canvas.addEventListener('mousedown',  down, false);
canvas.addEventListener('mousemove',  move, false);
canvas.addEventListener('mouseup',    up,   false);
canvas.addEventListener('mouseleave', up,   false);
canvas.addEventListener('touchstart', down, { passive: false });
canvas.addEventListener('touchmove',  move, { passive: false });
canvas.addEventListener('touchend',   up,   false);

function down(e) {
  if (!sceneData) return;
  e.preventDefault();
  const { x, y } = getPointer(e);

  // Check resize corner first if something is selected
  if (selectedIdx >= 0) {
    const corner = hitCorner(x, y, sceneData.objects[selectedIdx]);
    if (corner) {
      resizing      = true;
      resizeCorner  = corner;
      resizeOrigin  = { x, y, obj: { ...sceneData.objects[selectedIdx] } };
      return;
    }
  }

  // Otherwise check object hit
  const hit = hitObject(x, y);
  if (hit >= 0) {
    selectedIdx = hit;
    dragging    = true;
    const { px, py } = toPixels(sceneData.objects[hit]);
    dragOff = { x: x-px, y: y-py };
  } else {
    selectedIdx = -1;
  }

  buildObjectList();
  showProps();
  redraw();
}

function move(e) {
  if (!sceneData) return;
  e.preventDefault();
  const { x, y } = getPointer(e);

  if (resizing && resizeOrigin) {
    const orig = resizeOrigin.obj;
    const dx   = x - resizeOrigin.x;
    const dy   = y - resizeOrigin.y;
    const origPx = (orig.x/100)*canvas.width;
    const origPy = (orig.y/100)*canvas.height;
    const origPw = (orig.w/100)*canvas.width;
    const origPh = (orig.h/100)*canvas.height;

    let npx=origPx, npy=origPy, npw=origPw, nph=origPh;

    if (resizeCorner==='br') { npw=Math.max(20,origPw+dx); nph=Math.max(20,origPh+dy); }
    if (resizeCorner==='bl') { npx=origPx+dx; npw=Math.max(20,origPw-dx); nph=Math.max(20,origPh+dy); }
    if (resizeCorner==='tr') { npy=origPy+dy; npw=Math.max(20,origPw+dx); nph=Math.max(20,origPh-dy); }
    if (resizeCorner==='tl') { npx=origPx+dx; npy=origPy+dy; npw=Math.max(20,origPw-dx); nph=Math.max(20,origPh-dy); }

    const u = toPercent(npx, npy, npw, nph);
    Object.assign(sceneData.objects[selectedIdx], u);
    updateCoordBadge();
    showProps();
    buildObjectList();
    updateJSON();
    redraw();
    return;
  }

  if (dragging && selectedIdx >= 0) {
    const obj        = sceneData.objects[selectedIdx];
    const { pw, ph } = toPixels(obj);
    let npx = Math.max(0, Math.min(canvas.width-pw,  x - dragOff.x));
    let npy = Math.max(0, Math.min(canvas.height-ph, y - dragOff.y));
    const u  = toPercent(npx, npy, pw, ph);
    obj.x = u.x; obj.y = u.y;
    updateCoordBadge();
    showProps();
    buildObjectList();
    updateJSON();
    redraw();
  }
}

function up() {
  dragging = false; resizing = false;
  resizeCorner = null; resizeOrigin = null;
}

function updateCoordBadge() {
  if (selectedIdx < 0) { document.getElementById('coord-badge').textContent = ''; return; }
  const o = sceneData.objects[selectedIdx];
  document.getElementById('coord-badge').textContent =
    `${o.label || o.id}  x:${o.x} y:${o.y} w:${o.w} h:${o.h}`;
}


/* ─────────────────────────────────────────
   TABS
───────────────────────────────────────── */
function switchTab(name) {
  activeTab = name;
  ['obj','prop','json'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
    document.getElementById('pane-'+t).style.display = t===name ? '' : 'none';
  });
}


/* ─────────────────────────────────────────
   OBJECT LIST
───────────────────────────────────────── */
function buildObjectList() {
  const pane = document.getElementById('pane-obj');
  if (!sceneData?.objects) { pane.innerHTML='<p style="color:var(--muted);font-size:0.8rem;margin-top:8px">Load a scene.</p>'; return; }

  pane.innerHTML = '';
  sceneData.objects.forEach((obj, i) => {
    const isChar = obj.imageType === 'characters';
    const d = document.createElement('div');
    d.className = `obj-row${i===selectedIdx?' sel':''}`;
    d.innerHTML = `
      <span class="badge ${isChar?'badge-char':'badge-obj'}">${isChar?'char':'obj'}</span>
      <div class="obj-row-name">${obj.label||obj.id}</div>
      <div class="obj-row-vals">x:${obj.x} y:${obj.y} w:${obj.w} h:${obj.h}</div>
    `;
    d.onclick = () => { selectedIdx=i; buildObjectList(); showProps(); switchTab('prop'); redraw(); updateCoordBadge(); };
    pane.appendChild(d);
  });
}


/* ─────────────────────────────────────────
   PROPERTIES
───────────────────────────────────────── */
function showProps() {
  const pane = document.getElementById('pane-prop');
  if (selectedIdx < 0 || !sceneData) {
    pane.innerHTML='<p style="color:var(--muted);font-size:0.8rem;margin-top:8px">Select an object.</p>';
    return;
  }
  const obj = sceneData.objects[selectedIdx];
  pane.innerHTML = `
    <div class="pg-title">Identity</div>
    <div style="font-size:0.75rem;color:var(--muted);margin-bottom:4px;font-family:monospace">${obj.id}</div>
    <div style="font-size:0.8rem;margin-bottom:10px">${obj.label||'—'}</div>

    <div class="pg-title">Position %</div>
    <div class="pr"><span class="pl">X</span><input class="pi" type="number" step="0.5" value="${obj.x}" oninput="setProp('x',this.value)"/></div>
    <div class="pr"><span class="pl">Y</span><input class="pi" type="number" step="0.5" value="${obj.y}" oninput="setProp('y',this.value)"/></div>

    <div class="pg-title">Size %</div>
    <div class="pr"><span class="pl">W</span><input class="pi" type="number" step="0.5" value="${obj.w}" oninput="setProp('w',this.value)"/></div>
    <div class="pr"><span class="pl">H</span><input class="pi" type="number" step="0.5" value="${obj.h}" oninput="setProp('h',this.value)"/></div>

    <div class="pg-title">Nudge (1% steps)</div>
    <div class="nudge-grid">
      <div></div>
      <button class="btn btn-muted" onclick="nudge(0,-1)">▲</button>
      <div></div>
      <button class="btn btn-muted" onclick="nudge(-1,0)">◀</button>
      <button class="btn btn-muted" style="opacity:0.3" disabled>·</button>
      <button class="btn btn-muted" onclick="nudge(1,0)">▶</button>
      <div></div>
      <button class="btn btn-muted" onclick="nudge(0,1)">▼</button>
      <div></div>
    </div>
  `;
}

function setProp(key, val) {
  if (selectedIdx<0||!sceneData) return;
  const v = parseFloat(val);
  if (isNaN(v)) return;
  sceneData.objects[selectedIdx][key] = round1(v);
  buildObjectList(); updateJSON(); redraw(); updateCoordBadge();
}

function nudge(dx, dy) {
  if (selectedIdx<0||!sceneData) return;
  const obj = sceneData.objects[selectedIdx];
  obj.x = round1(obj.x+dx); obj.y = round1(obj.y+dy);
  showProps(); buildObjectList(); updateJSON(); redraw(); updateCoordBadge();
}


/* ─────────────────────────────────────────
   JSON
───────────────────────────────────────── */
function updateJSON() {
  if (!sceneData) return;
  document.getElementById('json-out').textContent = JSON.stringify(sceneData, null, 2);
}

function copyJSON() {
  if (!sceneData) { toast('Load a scene first'); return; }
  const txt = JSON.stringify(sceneData, null, 2);
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(()=>toast('JSON copied! Paste into SPCK'));
  } else {
    const ta=document.createElement('textarea'); ta.value=txt;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); toast('JSON copied!');
  }
}

function downloadJSON() {
  if (!sceneData) { toast('Load a scene first'); return; }
  const blob = new Blob([JSON.stringify(sceneData,null,2)],{type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=(sceneData.id||'scene')+'.json'; a.click();
  URL.revokeObjectURL(url);
  toast('Downloaded ' + a.download);
}


/* ─────────────────────────────────────────
   LOADER / STATUS / TOAST
───────────────────────────────────────── */
function showLoader(msg) {
  const el = document.getElementById('loader');
  document.getElementById('loader-msg').textContent = msg||'Loading…';
  el.classList.remove('gone');
}
function hideLoader(errMsg) {
  const el = document.getElementById('loader');
  if (errMsg) { document.getElementById('loader-msg').textContent = errMsg; return; }
  el.classList.add('gone');
}
function setStatus(msg) { document.getElementById('statusbar').textContent = msg; }

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('up');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('up'), 2500);
}
</script>

</body>
