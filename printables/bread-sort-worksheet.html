<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bread Sort Worksheet | Adventopia</title>
  <style>
    body { font-family:Arial,sans-serif; text-align:center; background:#f9f9f9; padding:20px; }
    h1 { color:#FF9800; }
    .basket { display:inline-block; width:140px; height:140px; border:3px dashed #333; margin:15px; vertical-align:top; background:#fff; }
    .bread { width:50px; height:50px; border:2px solid #333; margin:8px; display:inline-block; font-size:30px; line-height:50px; }
    @media print { body { margin:0; background:white; } }
  </style>
</head>
<body>
  <h1>🍞 Bread Sort Challenge</h1>
  <p>Draw lines or cut & paste each bread into the correct shape basket!</p>
  
  <div style="margin:40px 0;">
    <div class="basket"><div style="font-size:50px;">⭕</div><p>Circle</p></div>
    <div class="basket"><div style="font-size:50px;">⬜</div><p>Square</p></div>
    <div class="basket"><div style="font-size:50px;">🔺</div><p>Triangle</p></div>
  </div>
  
  <div style="font-size:50px;">
    <div class="bread" style="background:#FFE0B2;">⭕</div>
    <div class="bread" style="background:#FFE0B2;">⬜</div>
    <div class="bread" style="background:#FFE0B2;">🔺</div>
    <div class="bread" style="background:#FFE0B2;">⭕</div>
    <div class="bread" style="background:#FFE0B2;">⬜</div>
    <div class="bread" style="background:#FFE0B2;">🔺</div>
  </div>
  
  <p style="margin-top:40px;">Adventopia | Print & Practice Shape Sorting!</p>
</body>
</html>
