<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pip Colouring Page | Adventopia</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #1e3a8a);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      color: white;
    }
    .header { text-align:center; margin-bottom:24px; }
    .header h1 { font-size:2rem; color:#FFD700; margin-bottom:8px; }
    .header p { opacity:0.85; font-size:1rem; }
    .preview {
      background: white;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      max-width: 600px;
      width: 100%;
      margin-bottom: 24px;
    }
    .preview img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 6px;
    }
    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 24px;
    }
    .btn {
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      border: none;
      text-decoration: none;
      display: inline-block;
    }
    .btn-print {
      background: #FFD700;
      color: #1a237e;
    }
    .btn-download {
      background: #4CAF50;
      color: white;
    }
    .back {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size:0.9rem;
    }
    .back:hover { color: #FFD700; }

    @media print {
      body {
        background: white;
        padding: 0;
      }
      .header, .buttons, .back { display: none; }
      .preview {
        box-shadow: none;
        padding: 0;
        max-width: 100%;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧒 Pip the Explorer — Colouring Page</h1>
    <p>Print and colour Pip's adventurous outfit!</p>
  </div>

  <div class="preview">
    <img src="coloring-pip.png" alt="Pip the Explorer colouring page">
  </div>

  <div class="buttons">
    <button class="btn btn-print" onclick="window.print()">🖨️ Print Now</button>
    <a class="btn btn-download" href="pdf/adventopia_coloring_pip.pdf" download>⬇️ Download PDF</a>
  </div>

  <a class="back" href="../index.html">← Back to Adventopia</a>
</body>
</html>
