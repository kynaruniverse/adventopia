<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pip the Explorer - Coloring Page | Adventopia</title>
  <style>
    body { font-family:Arial,sans-serif; text-align:center; background:#f9f9f9; padding:20px; }
    svg { max-width:90%; height:auto; border:2px solid #ccc; background:white; }
    h1 { color:#2C5F8A; }
    @media print { body { margin:0; background:white; } svg { border:none; } }
  </style>
</head>
<body>
  <h1>🧒 Color Pip the Explorer!</h1>
  <p>Print and color Pip's backpack, scarf, and adventurous outfit!</p>
  
  <svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
    <!-- Head -->
    <circle cx="100" cy="80" r="25" fill="none" stroke="#333" stroke-width="3"/>
    <!-- Hair -->
    <path d="M80 70 Q100 50 120 70" fill="none" stroke="#333" stroke-width="3"/>
    <!-- Eyes -->
    <circle cx="90" cy="78" r="5" fill="white" stroke="#333" stroke-width="2"/>
    <circle cx="110" cy="78" r="5" fill="white" stroke="#333" stroke-width="2"/>
    <!-- Smile -->
    <path d="M85 95 Q100 105 115 95" fill="none" stroke="#333" stroke-width="3"/>
    <!-- Body / Shirt -->
    <rect x="70" y="105" width="60" height="80" rx="10" fill="none" stroke="#333" stroke-width="3"/>
    <!-- Scarf -->
    <rect x="75" y="130" width="50" height="15" fill="none" stroke="#FF4500" stroke-width="4"/>
    <!-- Backpack -->
    <rect x="80" y="110" width="40" height="60" rx="5" fill="none" stroke="#8B4513" stroke-width="3"/>
    <!-- Arms / Legs (simple) -->
    <line x1="70" y1="130" x2="50" y2="170" stroke="#333" stroke-width="4"/>
    <line x1="130" y1="130" x2="150" y2="170" stroke="#333" stroke-width="4"/>
    <rect x="75" y="185" width="20" height="40" rx="5" fill="none" stroke="#333" stroke-width="3"/>
    <rect x="105" y="185" width="20" height="40" rx="5" fill="none" stroke="#333" stroke-width="3"/>
    <!-- Shoes -->
    <ellipse cx="85" cy="235" rx="15" ry="8" fill="none" stroke="#333" stroke-width="3"/>
    <ellipse cx="115" cy="235" rx="15" ry="8" fill="none" stroke="#333" stroke-width="3"/>
    <!-- Label -->
    <text x="100" y="280" font-size="24" text-anchor="middle" fill="#2C5F8A">Pip</text>
  </svg>
  
  <p style="margin-top:30px;">Adventopia | Print & Color!</p>
</body>
</html>
