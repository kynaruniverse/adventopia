<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shell the Tortoise - Coloring Page | Adventopia</title>
  <style>
    body { font-family:Arial,sans-serif; text-align:center; background:#f9f9f9; padding:20px; }
    svg { max-width:90%; height:auto; border:2px solid #ccc; background:white; }
    h1 { color:#4CAF50; }
    @media print { body { margin:0; background:white; } svg { border:none; } }
  </style>
</head>
<body>
  <h1>🐢 Color Shell the Tortoise!</h1>
  <p>Print and color Shell's shell patterns and happy face!</p>
  
  <svg viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">
    <!-- Shell -->
    <ellipse cx="110" cy="100" rx="90" ry="70" fill="none" stroke="#333" stroke-width="4"/>
    <!-- Shell patterns -->
    <path d="M50 80 Q110 40 170 80" fill="none" stroke="#333" stroke-width="3" stroke-dasharray="5,5"/>
    <circle cx="110" cy="100" r="30" fill="none" stroke="#333" stroke-width="3"/>
    <!-- Body -->
    <ellipse cx="110" cy="140" rx="100" ry="50" fill="none" stroke="#333" stroke-width="3"/>
    <!-- Head -->
    <circle cx="170" cy="110" r="30" fill="none" stroke="#333" stroke-width="3"/>
    <!-- Eye -->
    <circle cx="180" cy="100" r="8" fill="white" stroke="#333" stroke-width="2"/>
    <circle cx="182" cy="100" r="3" fill="black"/>
    <!-- Legs -->
    <ellipse cx="60" cy="170" rx="20" ry="30" fill="none" stroke="#333" stroke-width="3"/>
    <ellipse cx="160" cy="170" rx="20" ry="30" fill="none" stroke="#333" stroke-width="3"/>
    <ellipse cx="80" cy="210" rx="15" ry="10" fill="none" stroke="#333" stroke-width="3"/>
    <ellipse cx="140" cy="210" rx="15" ry="10" fill="none" stroke="#333" stroke-width="3"/>
    <!-- Label -->
    <text x="110" y="260" font-size="28" text-anchor="middle" fill="#4CAF50">Shell</text>
  </svg>
  
  <p style="margin-top:30px;">Adventopia | Print & Color!</p>
</body>
</html>
